<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮籌備管理系統 | Wedding Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ivory: #faf7f2;
    --blush: #e8c4b0;
    --rose: #c9826b;
    --deep: #5c3d2e;
    --sage: #8a9e8c;
    --gold: #c4a35a;
    --charcoal: #2d2d2d;
    --light: #f0ebe3;
    --shadow: rgba(92,61,46,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--ivory);
    color: var(--charcoal);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--deep);
    color: var(--ivory);
    text-align: center;
    padding: 3rem 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(200,130,107,0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(196,163,90,0.2) 0%, transparent 60%);
  }
  .header-content { position: relative; z-index: 1; }
  .header-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    color: var(--blush);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }
  .header-divider {
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    margin: 0.8rem auto;
    max-width: 300px;
  }
  .header-divider::before, .header-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.5;
  }
  .header-divider span { color: var(--gold); font-size: 0.7rem; }

  /* NAV */
  nav {
    background: white;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  nav button {
    padding: 1rem 1.4rem;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 0.08em;
    border-bottom: 2px solid transparent;
    transition: all 0.25s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  nav button:hover { color: var(--rose); }
  nav button.active {
    color: var(--deep);
    border-bottom-color: var(--gold);
    font-weight: 500;
  }

  /* MAIN & PANELS */
  main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  .panel { display: none; animation: fadeIn 0.4s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; color: var(--deep); margin-bottom: 0.3rem; }
  .section-subtitle { font-size: 0.8rem; color: #999; letter-spacing: 0.12em; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--light); }

  /* OVERVIEW CARDS */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .ov-card {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    text-align: center;
    border: 1px solid var(--light);
    box-shadow: 0 4px 15px var(--shadow);
  }
  .ov-num { font-size: 2.5rem; color: var(--deep); font-family: 'Cormorant Garamond', serif; font-weight: 300; }
  .ov-label { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; margin-top: 0.5rem; }

  /* CHECKLIST UI */
  .checklist-item {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem;
    background: white;
    border-radius: 8px;
    margin-bottom: 0.8rem;
    border: 1px solid transparent;
    transition: 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  }
  .checklist-item:hover { border-color: var(--blush); }
  .checklist-item.done { opacity: 0.6; }
  .checklist-item.done .item-text { text-decoration: line-through; }
  .checkbox { width: 22px; height: 22px; border: 2px solid var(--blush); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
  .checklist-item.done .checkbox { background: var(--sage); border-color: var(--sage); }
  .checkbox::after { content: '✓'; color: white; display: none; font-size: 14px; }
  .checklist-item.done .checkbox::after { display: block; }
  .item-text { flex-grow: 1; font-size: 0.95rem; }
  .btn-del { color: #ccc; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
  .btn-del:hover { color: var(--rose); }

  /* TIMELINE UI */
  .timeline-container { position: relative; padding-left: 100px; }
  .timeline-container::before {
    content: ''; position: absolute; left: 110px; top: 0; bottom: 0; width: 2px; background: var(--light);
  }
  .timeline-item { display: flex; margin-bottom: 2rem; position: relative; }
  .time-label { position: absolute; left: -100px; width: 80px; text-align: right; color: var(--rose); font-family: 'Cormorant Garamond', serif; font-weight: bold; }
  .time-dot { position: absolute; left: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--gold); border: 2px solid white; z-index: 1; top: 8px; }
  .event-card { background: white; padding: 1.2rem; border-radius: 10px; border: 1px solid var(--light); flex-grow: 1; box-shadow: 0 4px 10px var(--shadow); }
  .event-card h3 { font-size: 1.1rem; color: var(--deep); margin-bottom: 0.5rem; }
  .event-detail { font-size: 0.85rem; color: #777; }

  /* INPUTS */
  .add-row { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
  input, select, textarea {
    padding: 0.8rem; border: 1px solid var(--light); border-radius: 6px; font-family: inherit; outline: none;
  }
  input:focus { border-color: var(--blush); }
  .btn-primary { background: var(--deep); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer; transition: 0.3s; }
  .btn-primary:hover { background: var(--rose); }

  /* STAFF GRID */
  .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
  .staff-card { background: white; padding: 1.5rem; border-radius: 10px; border: 1px solid var(--light); box-shadow: 0 3px 8px var(--shadow); }
  .staff-role { color: var(--gold); font-size: 0.75rem; letter-spacing: 0.1em; font-weight: bold; text-transform: uppercase; }
  .staff-name { font-size: 1.1rem; margin: 0.5rem 0; color: var(--deep); }

  @media (max-width: 600px) {
    nav button { padding: 0.8rem 0.6rem; font-size: 0.75rem; }
    .timeline-container { padding-left: 60px; }
    .timeline-container::before { left: 70px; }
    .time-label { left: -60px; width: 50px; font-size: 0.8rem; }
    .time-dot { left: 5px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="header-en">Wedding Planning Manager</div>
    <h1>婚禮籌備管理系統</h1>
    <div class="header-divider"><span>✦</span></div>
    <p>記錄每一個美好的準備時刻</p>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('overview')">📋 總覽</button>
  <button onclick="switchTab('checklist')">✅ 待辦清單</button>
  <button onclick="switchTab('wedding')">💒 婚禮流程</button>
  <button onclick="switchTab('staff')">👥 工作人員</button>
  <button onclick="switchTab('notes')">📝 備忘筆記</button>
</nav>

<main>
  <!-- OVERVIEW -->
  <div id="panel-overview" class="panel active">
    <div class="section-title">婚禮籌備總覽</div>
    <div class="section-subtitle">OVERVIEW · 掌握即時進度</div>
    <div class="overview-grid">
      <div class="ov-card">
        <div class="ov-num" id="ov-todo-count">0</div>
        <div class="ov-label">待辦事項</div>
      </div>
      <div class="ov-card">
        <div class="ov-num" id="ov-done-count">0</div>
        <div class="ov-label">已完成項目</div>
      </div>
      <div class="ov-card">
        <div class="ov-num" id="ov-staff-count">0</div>
        <div class="ov-label">工作人員</div>
      </div>
    </div>
    <div style="background:white; padding: 2rem; border-radius:12px; border: 1px solid var(--light);">
      <p style="font-size: 0.9rem; color: var(--gold); margin-bottom: 0.5rem;">整體進度</p>
      <div style="height: 12px; background: var(--light); border-radius: 10px; overflow: hidden;">
        <div id="ov-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); transition: 0.5s;"></div>
      </div>
      <p id="ov-progress-text" style="text-align: right; font-size: 0.8rem; margin-top: 0.5rem; color: #999;">0% 完成</p>
    </div>
  </div>

  <!-- CHECKLIST -->
  <div id="panel-checklist" class="panel">
    <div class="section-title">待辦事項清單</div>
    <div class="section-subtitle">CHECKLIST · 步步為營</div>
    <div id="checklist-list"></div>
    <div class="add-row">
      <input type="text" id="new-todo-text" style="flex-grow:1" placeholder="新增待辦事項...">
      <button class="btn-primary" onclick="addTodo()">新增</button>
    </div>
  </div>

  <!-- WEDDING FLOW -->
  <div id="panel-wedding" class="panel">
    <div class="section-title">婚禮流程表</div>
    <div class="section-subtitle">WEDDING FLOW · 精確掌控時間</div>
    <div class="timeline-container" id="timeline-list"></div>
    <div class="add-row" style="background: white; padding: 1.5rem; border-radius: 10px; border: 1px dashed var(--blush);">
      <input type="time" id="new-flow-time" value="12:00">
      <input type="text" id="new-flow-title" placeholder="活動名稱" style="flex-grow:1">
      <input type="text" id="new-flow-desc" placeholder="詳細備註" style="flex-grow:1">
      <button class="btn-primary" onclick="addFlow()">新增活動</button>
    </div>
  </div>

  <!-- STAFF -->
  <div id="panel-staff" class="panel">
    <div class="section-title">工作人員名單</div>
    <div class="section-subtitle">STAFF · 團隊分工</div>
    <div class="staff-grid" id="staff-list"></div>
    <div class="add-row">
      <input type="text" id="new-staff-role" placeholder="職位 (如: 總召)">
      <input type="text" id="new-staff-name" placeholder="姓名" style="flex-grow:1">
      <button class="btn-primary" onclick="addStaff()">新增人員</button>
    </div>
  </div>

  <!-- NOTES -->
  <div id="panel-notes" class="panel">
    <div class="section-title">備忘筆記</div>
    <div class="section-subtitle">NOTES · 隨手記錄靈感</div>
    <textarea id="notes-content" style="width: 100%; min-height: 300px; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--light); font-size: 1rem;" placeholder="輸入您的筆記..." oninput="saveNotes()"></textarea>
  </div>
</main>

<script>
  // 資料狀態
  let state = {
    todos: JSON.parse(localStorage.getItem('wedding_todos')) || [
      { id: 1, text: '訂購婚禮喜餅', done: false },
      { id: 2, text: '確認伴郎伴娘名單', done: true }
    ],
    flows: JSON.parse(localStorage.getItem('wedding_flows')) || [
      { id: 1, time: '11:00', title: '新娘化妝開始', desc: '新秘老師抵達飯店' },
      { id: 2, time: '12:30', title: '迎娶儀式', desc: '新郎出發至新娘家' }
    ],
    staff: JSON.parse(localStorage.getItem('wedding_staff')) || [
      { id: 1, role: '總召', name: '王大明' },
      { id: 2, role: '伴娘', name: '林小美' }
    ],
    notes: localStorage.getItem('wedding_notes') || ''
  };

  function saveState() {
    localStorage.setItem('wedding_todos', JSON.stringify(state.todos));
    localStorage.setItem('wedding_flows', JSON.stringify(state.flows));
    localStorage.setItem('wedding_staff', JSON.stringify(state.staff));
    localStorage.setItem('wedding_notes', state.notes);
    renderAll();
  }

  // 切換頁籤
  function switchTab(tabId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // 待辦功能
  function addTodo() {
    const text = document.getElementById('new-todo-text').value;
    if (!text) return;
    state.todos.push({ id: Date.now(), text, done: false });
    document.getElementById('new-todo-text').value = '';
    saveState();
  }

  function toggleTodo(id) {
    const todo = state.todos.find(t => t.id === id);
    if (todo) todo.done = !todo.done;
    saveState();
  }

  function deleteTodo(id) {
    state.todos = state.todos.filter(t => t.id !== id);
    saveState();
  }

  // 流程功能
  function addFlow() {
    const time = document.getElementById('new-flow-time').value;
    const title = document.getElementById('new-flow-title').value;
    const desc = document.getElementById('new-flow-desc').value;
    if (!title) return;
    state.flows.push({ id: Date.now(), time, title, desc });
    state.flows.sort((a, b) => a.time.localeCompare(b.time));
    document.getElementById('new-flow-title').value = '';
    document.getElementById('new-flow-desc').value = '';
    saveState();
  }

  function deleteFlow(id) {
    state.flows = state.flows.filter(f => f.id !== id);
    saveState();
  }

  // 人員功能
  function addStaff() {
    const role = document.getElementById('new-staff-role').value;
    const name = document.getElementById('new-staff-name').value;
    if (!role || !name) return;
    state.staff.push({ id: Date.now(), role, name });
    document.getElementById('new-staff-role').value = '';
    document.getElementById('new-staff-name').value = '';
    saveState();
  }

  function deleteStaff(id) {
    state.staff = state.staff.filter(s => s.id !== id);
    saveState();
  }

  // 筆記功能
  function saveNotes() {
    state.notes = document.getElementById('notes-content').value;
    localStorage.setItem('wedding_notes', state.notes);
    updateOverview();
  }

  // 渲染頁面
  function renderAll() {
    renderTodos();
    renderFlows();
    renderStaff();
    updateOverview();
  }

  function renderTodos() {
    const list = document.getElementById('checklist-list');
    list.innerHTML = state.todos.map(t => `
      <div class="checklist-item ${t.done ? 'done' : ''}">
        <div class="checkbox" onclick="toggleTodo(${t.id})"></div>
        <div class="item-text" onclick="toggleTodo(${t.id})">${t.text}</div>
        <div class="btn-del" onclick="deleteTodo(${t.id})">×</div>
      </div>
    `).join('');
  }

  function renderFlows() {
    const list = document.getElementById('timeline-list');
    list.innerHTML = state.flows.map(f => `
      <div class="timeline-item">
        <div class="time-label">${f.time}</div>
        <div class="time-dot"></div>
        <div class="event-card">
          <div style="display:flex; justify-content:space-between">
            <h3>${f.title}</h3>
            <span class="btn-del" onclick="deleteFlow(${f.id})">×</span>
          </div>
          <div class="event-detail">${f.desc}</div>
        </div>
      </div>
    `).join('');
  }

  function renderStaff() {
    const list = document.getElementById('staff-list');
    list.innerHTML = state.staff.map(s => `
      <div class="staff-card">
        <div style="display:flex; justify-content:space-between">
          <div class="staff-role">${s.role}</div>
          <span class="btn-del" onclick="deleteStaff(${s.id})">×</span>
        </div>
        <div class="staff-name">${s.name}</div>
      </div>
    `).join('');
  }

  function updateOverview() {
    const total = state.todos.length;
    const done = state.todos.filter(t => t.done).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('ov-todo-count').innerText = total - done;
    document.getElementById('ov-done-count').innerText = done;
    document.getElementById('ov-staff-count').innerText = state.staff.length;
    document.getElementById('ov-progress-bar').style.width = pct + '%';
    document.getElementById('ov-progress-text').innerText = pct + '% 完成';
  }

  // 初始化
  window.onload = () => {
    document.getElementById('notes-content').value = state.notes;
    renderAll();
  };
</script>

</body>
</html>
